name: CI

on:
  push:
    branches: [ "main", "test-failure" ]  # Menjaga agar branch apapun tetap jalan
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test with coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest -q --cov=. --cov-report=xml --cov-report=term

      - name: Enforce coverage threshold
        run: |
          python - << 'PY'
          import xml.etree.ElementTree as ET
          import sys
          try:
              tree = ET.parse('coverage.xml')
              root = tree.getroot()
              lines_valid = int(root.get('lines-valid', '0'))
              lines_covered = int(root.get('lines-covered', '0'))
              pct = (lines_covered / lines_valid) * 100 if lines_valid else 0
              print(f"Coverage: {pct:.2f}%")
              if pct < 80: sys.exit(1)
          except: sys.exit(0)
          PY